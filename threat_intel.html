<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ASNA — Threat Intelligence</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0a0e1a; color: #e0e0e0; }
        .navbar { background: #0d1117; border-bottom: 1px solid #00ff88; }
        .navbar-brand { color: #00ff88 !important; font-weight: bold; }
        .card { background: #0d1117; border: 1px solid #1e3a2e; border-radius: 12px; }
        table { color: #e0e0e0 !important; }
        h4 { color: #00ff88; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg">
    <div class="container">
        <span class="navbar-brand">🛡️ ASNA — Threat Intel</span>
        <div class="d-flex gap-3">
            <a href="/" class="btn btn-sm btn-outline-success">Dashboard</a>
            <a href="/simulate" class="btn btn-sm btn-outline-info">Simulate</a>
            <a href="/threat-intel" class="btn btn-sm btn-outline-warning">Threat Intel</a>
        </div>
    </div>
</nav>
<div class="container mt-4">
    <div class="card p-4">
        <h4>🔍 Threat Intelligence Database</h4>
        <table class="table table-dark table-hover mt-3">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Tactic</th>
                    <th>Category</th>
                    <th>Frequency</th>
                    <th>First Seen</th>
                    <th>Last Seen</th>
                </tr>
            </thead>
            <tbody>
                {% for t in stats.top_threats %}
                <tr>
                    <td>{{ loop.index }}</td>
                    <td><span class="badge bg-danger">{{ t[1] }}</span></td>
                    <td><span class="badge bg-secondary">{{ t[2] }}</span></td>
                    <td><strong style="color:#00ff88">{{ t[4] }}</strong></td>
                    <td>{{ t[5] }}</td>
                    <td>{{ t[6] }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
